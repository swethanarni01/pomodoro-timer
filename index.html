<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Pomodoro Timer</h1>
      <p class="tagline">Stay focused. Take breaks. Get things done.</p>
    </header>

    <main class="main">
      <!-- Mode Selector -->
      <div class="mode-tabs" role="tablist" aria-label="Timer mode">
        <button class="tab active" data-mode="pomodoro" role="tab" aria-selected="true">Pomodoro</button>
        <button class="tab" data-mode="shortBreak" role="tab" aria-selected="false">Short Break</button>
        <button class="tab" data-mode="longBreak" role="tab" aria-selected="false">Long Break</button>
      </div>

      <!-- Timer Display -->
      <div class="timer-card">
        <div class="progress-ring-container" aria-hidden="true">
          <svg class="progress-ring" viewBox="0 0 220 220">
            <circle class="progress-ring__track" cx="110" cy="110" r="96" />
            <circle class="progress-ring__fill" id="progressCircle" cx="110" cy="110" r="96" />
          </svg>
          <div class="timer-display">
            <span id="timerMinutes" class="timer-minutes">25</span>
            <span class="timer-colon">:</span>
            <span id="timerSeconds" class="timer-seconds">00</span>
          </div>
        </div>
        <p class="session-label" id="sessionLabel">Focus Time</p>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-secondary" id="resetBtn" aria-label="Reset timer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
          </svg>
        </button>

        <button class="btn btn-primary" id="startBtn" aria-label="Start timer">
          <svg id="startIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>

        <button class="btn btn-secondary" id="skipBtn" aria-label="Skip to next session">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>
      </div>

      <!-- Session Counter -->
      <div class="session-info">
        <div class="session-counter">
          <span class="session-count-label">Sessions completed today</span>
          <div class="session-dots" id="sessionDots" aria-label="Sessions completed">
            <span class="dot" aria-hidden="true"></span>
            <span class="dot" aria-hidden="true"></span>
            <span class="dot" aria-hidden="true"></span>
            <span class="dot" aria-hidden="true"></span>
          </div>
        </div>
        <p class="session-count-text">
          <span id="completedCount">0</span> / <span id="totalGoal">4</span> pomodoros
        </p>
      </div>

      <!-- Settings Panel -->
      <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">Settings</h2>
        <div class="settings-grid">
          <div class="setting-item">
            <label for="pomodoroTime">Pomodoro (min)</label>
            <input type="number" id="pomodoroTime" min="1" max="60" value="25" />
          </div>
          <div class="setting-item">
            <label for="shortBreakTime">Short Break (min)</label>
            <input type="number" id="shortBreakTime" min="1" max="30" value="5" />
          </div>
          <div class="setting-item">
            <label for="longBreakTime">Long Break (min)</label>
            <input type="number" id="longBreakTime" min="1" max="60" value="15" />
          </div>
        </div>
        <button class="btn btn-apply" id="applySettings">Apply Settings</button>
      </div>

      <button class="settings-toggle" id="settingsToggle" aria-label="Toggle settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        Settings
      </button>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
